<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Onyx Shine | Luxury Car Detailing</title>
    <style>
        :root { --gold: #D4AF37; --bg: #050507; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; }
        section { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding: 20px; }
        h1, h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .btn { border: 1px solid var(--gold); color: var(--gold); padding: 15px; text-align: center; text-decoration: none; margin-top: 20px; display: block; width: 200px; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 20px; border: 1px solid rgba(212,175,55,0.2); margin-top: 20px; }
    </style>
</head>
<body>
    <section id="hero">
        <h1>Onyx Shine</h1>
        <p>Expertiză în estetică auto de elită.</p>
        <a href="#contact" class="btn">SOLICITĂ CONSULTANȚĂ</a>
    </section>
    <section id="servicii">
        <h2>Servicii</h2>
        <div class="glass">
            <p>• Detailing Interior Premium</p>
            <p>• Tratament Ceramic Graphene</p>
            <p>• Detailing Exterior & Polish</p>
        </div>
    </section>
    <section id="contact">
        <h2>Contact</h2>
        <div class="glass">
            <p>office@onyxshine.ro</p>
            <p>+40 7XX XXX XXX</p>
        </div>
    </section>
</body>
</html>
